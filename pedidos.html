<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulário para registro de novos pedidos de bolos na Ms. Cakes.">
    <title>Novo Pedido - Ms. Cakes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div id="topo-empresa">
            <h1 class="title">Ms. Cakes</h1>
            <p>Controle de Encomendas e Produção</p>
        </div>
        <nav aria-label="Menu Principal">
            <ul>
                <li><a href="initial.html">Voltar ao Início</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="cadastro-pedido">
            <h2>Registrar Novo Pedido</h2>
            <form action="processar_pedido.php" method="POST">
                
                <fieldset>
                    <legend>Vínculo com Cliente</legend>
                    <label for="cliente">Selecionar Cliente:</label>
                    <select name="id_cliente" id="cliente" required>
                        <option value="">-- Escolha um cliente --</option>
                        </select>
                </fieldset>

                <fieldset>
                    <legend>Especificações do Bolo</legend>
                    <label for="pao_de_lo">Sabor do Pão-de-ló:</label>
                    <select name="pao_de_lo" id="pao_de_lo" required>
                        <option value="branco">Branco</option>
                        <option value="chocolate">Chocolate</option>
                    </select>

                    <br>

                    <label for="recheio">Recheio:</label>
                    <select name="id_recheio" id="recheio" required>
                        <option value="">-- Escolha um recheio --</option>
                        <option value="1">Doce de Leite</option>
                        <option value="2">Brigadeiro</option>
                        <option value="3">Beijinho</option>
                    </select>

                    <br>

                    <label for="cobertura">Cobertura:</label>
                    <select name="id_cobertura" id="cobertura" required>
                        <option value="">-- Escolha uma cobertura --</option>
                        <option value="1">Chocolate</option>
                        <option value="2">Branco</option>
                    </select>
                </fieldset>

                <fieldset>
                    <legend>Detalhes e Pagamento</legend>
                    <label for="peso">Peso (kg):</label>
                    <input type="number" step="0.1" name="peso" id="peso" required>

                    <label for="valor_total">Valor Total (R$):</label>
                    <input type="number" step="0.01" name="valor_total" id="valor_total" required>
                    
                    <label for="status_pagamento">Status:</label>
                    <select name="status_pagamento" id="status_pagamento">
                        <option value="não pago">Não Pago</option>
                        <option value="pago">Pago</option>
                    </select>
                </fieldset>

                <div style="text-align: center;">
                    <button type="submit">Finalizar Pedido</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ms. Cakes - Gestão de Produção</p>
    </footer>
</body>
</html>
